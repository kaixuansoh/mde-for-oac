# Hand-authored OpenTelemetry Collector configuration for the banking slice.
#
# Three shared pipelines collect from all six banking services. The traces
# pipeline applies compliance tagging and tail sampling so that errors and
# fraud-flagged traces are always retained while other traffic is sampled
# probabilistically.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  memory_limiter/traces:
    check_interval: 1s
    limit_mib: 1024
    spike_limit_mib: 256
  memory_limiter/metrics:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  attributes/compliance:
    actions:
      - key: bank.tenant
        action: insert
        value: acme
      - key: bank.region
        action: insert
        value: my-kl-1
      - key: data.classification
        action: upsert
        value: confidential
  batch/traces:
    timeout: 5s
    send_batch_size: 512
  batch/metrics:
    timeout: 10s
    send_batch_size: 1024
  batch/logs:
    timeout: 5s
    send_batch_size: 512
  tail_sampling:
    decision_wait: 30s
    policies:
      # Always retain anything with an ERROR status
      - name: errors-always
        type: status_code
        status_code:
          status_codes: [ERROR]
      # Always retain traces flagged by fraud detection
      - name: fraud-flagged-always
        type: string_attribute
        string_attribute:
          values: [fraud.flagged]
      # 10 % probabilistic sampling for the rest
      - name: probabilistic-rest
        type: probabilistic
        probabilistic:
          sampling_percentage: 10.0

exporters:
  otlp/traces:
    endpoint: otel-collector:4317
    compression: gzip
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889
  otlp/logs:
    endpoint: otel-collector:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter/traces, attributes/compliance, batch/traces, tail_sampling]
      exporters: [otlp/traces]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter/metrics, batch/metrics]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch/logs]
      exporters: [otlp/logs]
