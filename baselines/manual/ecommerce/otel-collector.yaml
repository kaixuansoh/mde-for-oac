# Hand-authored OpenTelemetry Collector configuration for the e-commerce slice.
# Three shared pipelines collecting from WebGateway, OrderService, and
# InventoryService.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch/traces:
    timeout: 5s
    send_batch_size: 512
  batch/metrics:
    timeout: 10s
    send_batch_size: 1024
  batch/logs:
    timeout: 5s
    send_batch_size: 512

exporters:
  otlp/traces:
    endpoint: otel-collector:4317
    compression: gzip
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889
  otlp/logs:
    endpoint: otel-collector:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch/traces]
      exporters: [otlp/traces]
    metrics:
      receivers: [otlp]
      processors: [batch/metrics]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch/logs]
      exporters: [otlp/logs]
