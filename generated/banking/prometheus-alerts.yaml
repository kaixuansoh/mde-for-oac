# Auto-generated Prometheus alerting rules
# Generated from: banking-observability v1.0.0

groups:
  - name: banking-observability
    rules:
      - alert: HighAuthFailureRate
        expr: "rate(auth_login_failures_total[5m]) / rate(auth_login_attempts_total[5m]) > 0.1"
        for: 5m
        labels:
          severity: critical
          team: "iam"
        annotations:
          description: "Authentication failure rate exceeds 10% over the last 5 minutes"
          summary: "Auth failure rate above 10%"
      - alert: SlowAuthLatencyP99
        expr: "histogram_quantile(0.99, sum(rate(auth_login_duration_bucket[5m])) by (le)) > 500"
        for: 10m
        labels:
          severity: warning
          team: "iam"
        annotations:
          description: "Authentication p99 latency exceeds 500ms over the last 5 minutes"
          summary: "Auth p99 above 500ms"
      - alert: HighTransactionFailureRate
        expr: "rate(transactions_failed_total[5m]) / rate(transactions_initiated_total[5m]) > 0.05"
        for: 5m
        labels:
          severity: critical
          team: "payments"
        annotations:
          description: "Transaction failure rate exceeds 5% over the last 5 minutes"
          summary: "Transaction failure rate above 5%"
      - alert: HighFraudFlagRate
        expr: "rate(fraud_flagged_total[10m]) / rate(fraud_scores_computed_total[10m]) > 0.01"
        for: 10m
        labels:
          severity: warning
          team: "risk"
        annotations:
          description: "Fraud flag rate exceeds 1% sustained over 10 minutes"
          summary: "Fraud flag rate above 1%"
      - alert: NotificationDeliveryFailures
        expr: "rate(notifications_failed_total[5m]) / (rate(notifications_sent_total[5m]) + rate(notifications_failed_total[5m])) > 0.02"
        for: 5m
        labels:
          severity: warning
          team: "platform"
        annotations:
          description: "Notification delivery failure rate exceeds 2% over 5 minutes"
          summary: "Notification failure rate above 2%"
      - alert: LedgerImbalance
        expr: "abs(ledger_balance_discrepancy) > 0"
        for: 2m
        labels:
          severity: critical
          team: "finance-engineering"
        annotations:
          description: "Ledger discrepancy detected — must be zero in steady state"
          summary: "Ledger imbalance — investigate immediately"
          runbook_url: "https://runbooks.acme.com/ledger/imbalance"
