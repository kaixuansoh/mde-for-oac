# Auto-generated OpenTelemetry Collector configuration
# Generated from: banking-observability v1.0.0

receivers:
  otlp/traces:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
  otlp/metrics:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
  otlp/logs:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  memory_limiter/traces:
    check_interval: 1s
    limit_mib: 1024
    spike_limit_mib: 256
  compliance_tags/traces:
    actions:
      - key: bank.tenant
        action: insert
        value: acme
      - key: bank.region
        action: insert
        value: my-kl-1
      - key: data.classification
        action: upsert
        value: confidential
  batch/traces:
    timeout: 5s
    send_batch_size: 512
  tail_sampling/traces:
    decision_wait: 30s
    policies:
      - name: errors-always
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: fraud-flagged-always
        type: string_attribute
        string_attribute:
          values: [fraud.flagged]
      - name: probabilistic-rest
        type: probabilistic
        probabilistic:
          sampling_percentage: 10.0
  memory_limiter/metrics:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch/metrics:
    timeout: 10s
    send_batch_size: 1024
  batch/logs:
    timeout: 5s
    send_batch_size: 512

exporters:
  otlp/traces:
    endpoint: otel-collector:4317
    compression: gzip
    tls:
      insecure: true
  prometheus/metrics:
    endpoint: 0.0.0.0:8889
  otlp/logs:
    endpoint: otel-collector:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp/traces]
      processors: [memory_limiter/traces, compliance_tags/traces, batch/traces, tail_sampling/traces]
      exporters: [otlp/traces]
    metrics:
      receivers: [otlp/metrics]
      processors: [memory_limiter/metrics, batch/metrics]
      exporters: [prometheus/metrics]
    logs:
      receivers: [otlp/logs]
      processors: [batch/logs]
      exporters: [otlp/logs]
