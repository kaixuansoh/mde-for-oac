# Auto-generated OpenTelemetry Collector configuration
# Generated from: payment-service-observability v1.0.0

receivers:
  otlp/traces:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
  jaeger/traces:
    protocols:
      http:
        endpoint: 0.0.0.0:14250
  otlp/metrics:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
  prometheus/metrics:
    config:
      scrape_configs:
        - job_name: 'otel'
          static_configs:
            - targets: ['0.0.0.0:9464']
  otlp/logs:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  memory_limiter/traces:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch/traces:
    timeout: 5s
    send_batch_size: 512
  tail_sampling/traces:
    decision_wait: 30s
    policies:
      - name: errors-policy
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: probabilistic-rest
        type: probabilistic
        probabilistic:
          sampling_percentage: 5.0
  memory_limiter/metrics:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch/metrics:
    timeout: 10s
    send_batch_size: 1024
  enrich/metrics:
    actions:
      - key: cluster
        action: insert
        value: prod-eu-1
      - key: region
        action: upsert
        value: eu-west-1
      - key: internal.debug
        action: delete
  batch/logs:
    timeout: 5s
    send_batch_size: 512

exporters:
  otlp/traces:
    endpoint: otel-collector:4317
    compression: gzip
    tls:
      insecure: true
  jaeger/traces:
    endpoint: jaeger:14250
    tls:
      insecure: true
  prometheus/metrics:
    endpoint: 0.0.0.0:8889
  otlp/logs:
    endpoint: otel-collector:4317
    tls:
      insecure: true
  logging/logs:
    loglevel: info

service:
  pipelines:
    traces:
      receivers: [otlp/traces, jaeger/traces]
      processors: [memory_limiter/traces, batch/traces, tail_sampling/traces]
      exporters: [otlp/traces, jaeger/traces]
    metrics:
      receivers: [otlp/metrics, prometheus/metrics]
      processors: [memory_limiter/metrics, batch/metrics, enrich/metrics]
      exporters: [prometheus/metrics]
    logs:
      receivers: [otlp/logs]
      processors: [batch/logs]
      exporters: [otlp/logs, logging/logs]
